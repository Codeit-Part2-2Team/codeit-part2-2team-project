seed: 42
stage: 1
task: detection
classes: [pill]
nc: 1

model:
  name: yolo26n
  pretrained: true

data:
  yaml: data/processed/dataset.yaml
  imgsz: 640
  workers: 4
  version: "v1.0"
  description: "baseline detection dataset"

train:
  epochs: 100
  batch: 16
  optimizer: auto
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 20
  device: ""

augment:
  mosaic: 1.0
  mixup: 0.1
  copy_paste: 0.0
  flipud: 0.0
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4

albumentations:
  bbox:
    format: yolo
    label_fields: [class_labels]
    min_visibility: 0.10
    clip: true
  horizontal_flip:
    p: 0.5
  vertical_flip:
    p: 0.2
  random_rotate90:
    p: 0.2
  shift_scale_rotate:
    p: 0.6
    shift_limit: 0.03
    scale_limit: 0.08
    rotate_limit: 8
  brightness_contrast:
    p: 0.5
    brightness_limit: 0.15
    contrast_limit: 0.15
  jpeg_compression:
    p: 0.3
    quality_lower: 85
    quality_upper: 100
  gaussian_blur:
    p: 0.2
    blur_limit: [3, 5]
  gauss_noise:
    p: 0.15
    std_range: [0.01, 0.03]

val:
  conf: 0.10
  iou: 0.45
  max_det: 300
  tta: false

output:
  project: experiments
  name: exp_20260420_baseline_yolo26n
  save_period: 10
